<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive.Local // Media & Cloud Enterprise Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #070A12; }
        code { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #070A12; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        .folder-content { margin-left: 12px; border-left: 1px solid #1E293B; padding-left: 4px; }
        .zoom-container { transform-origin: top left; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-100 overflow-hidden h-screen flex flex-col">

    <main class="flex-1 flex overflow-hidden relative w-full h-full">

        <div id="portalScreen" class="absolute inset-0 bg-[#070A12] z-30 flex flex-col items-center justify-center px-4 transition-all duration-300">
            <div class="max-w-md w-full text-center space-y-8">
                <div class="space-y-3">
                    <div class="h-12 w-12 mx-auto rounded-2xl bg-gradient-to-tr from-violet-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <span class="font-bold text-white text-xl">Δ</span>
                    </div>
                    <h2 class="text-3xl font-bold tracking-tight text-white">Universal Sandbox Studio</h2>
                    <p class="text-sm text-slate-400 max-w-sm mx-auto">Manage documents, play MP3/MP4 media, or bind live cloud files directly from a zero-server framework.</p>
                </div>

                <div class="bg-slate-950 p-6 rounded-2xl border border-slate-800/60 shadow-2xl space-y-5">
                    <button onclick="mountRealFileSystem()" class="w-full group relative flex items-center justify-between p-4 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white font-medium text-sm transition-all shadow-xl shadow-indigo-600/10 cursor-pointer">
                        <div class="flex items-center gap-3 text-left">
                            <span class="text-xl">💻</span>
                            <div>
                                <p class="font-bold text-white text-sm">Select Local Directory</p>
                                <p class="text-xs text-indigo-200/70">Launches hardware file stream arrays</p>
                            </div>
                        </div>
                        <span class="text-indigo-200 group-hover:translate-x-1 transition-transform">→</span>
                    </button>

                    <div class="relative flex py-1 items-center text-[10px] text-slate-500 uppercase tracking-widest justify-center">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                        <span class="relative px-3 bg-slate-950">GOOGLE DRIVE INTEGRATION</span>
                    </div>

                    <div class="space-y-3">
                        <input type="text" id="inputClientId" placeholder="Google Client ID" class="w-full bg-slate-900 p-2.5 rounded-xl text-xs border border-slate-800 text-slate-300 placeholder-slate-700 focus:border-indigo-500 outline-none">
                        <input type="text" id="inputApiKey" placeholder="Google API Key" class="w-full bg-slate-900 p-2.5 rounded-xl text-xs border border-slate-800 text-slate-300 placeholder-slate-700 focus:border-indigo-500 outline-none">
                        <input type="text" id="inputAppId" placeholder="Google Project Number" class="w-full bg-slate-900 p-2.5 rounded-xl text-xs border border-slate-800 text-slate-300 placeholder-slate-700 focus:border-indigo-500 outline-none">
                        
                        <button id="googleAuthBtn" onclick="initializeGoogleCloudHandshake()" class="w-full flex items-center justify-center gap-3 p-3 border border-slate-800 hover:border-slate-700 bg-slate-900 hover:bg-slate-850 rounded-xl text-xs font-semibold text-slate-200 transition-all cursor-pointer">
                            Sign in to Google Account
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="workspaceGrid" class="flex-1 flex opacity-0 pointer-events-none transition-opacity duration-300 w-full h-full overflow-hidden">
            </div>
    </main>

    <script>
        let directoryHandle = null;
        let activeFileHandle = null;
        let googleAccessToken = null;
        let localCommitCounter = 0;
        let sidebarCollapsedState = false;

        // ... Keep existing utility functions (verifyPermissionWithUser, traverseAndMapDirectoryStructure, etc.) ...

        function initializeGoogleCloudHandshake() {
            const clientId = document.getElementById('inputClientId').value;
            const apiKey = document.getElementById('inputApiKey').value;
            const appId = document.getElementById('inputAppId').value;

            if (!clientId || !apiKey || !appId) {
                alert("Please enter your Google Client ID, API Key, and Project Number.");
                return;
            }
            
            const client = google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: 'https://www.googleapis.com/auth/drive.readonly',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        googleAccessToken = tokenResponse.access_token;
                        document.getElementById('googleAuthBtn').innerText = "✓ Linked to Google Cloud Platform";
                        document.getElementById('googleAuthBtn').className = "w-full flex items-center justify-center gap-3 p-3 border border-emerald-800 bg-emerald-950 text-emerald-400 rounded-xl text-xs font-semibold";
                        
                        gapi.load('picker', {'callback': () => openGoogleDrivePickerOverlay(appId, apiKey)});
                    }
                },
            });
            client.requestAccessToken();
        }

        function openGoogleDrivePickerOverlay(appId, apiKey) {
            if (!googleAccessToken) return;
            
            const view = new google.picker.View(google.picker.ViewId.DOCS);
            view.setMimeTypes("video/mp4,audio/mp3,application/vnd.google-apps.document,application/pdf");

            const picker = new google.picker.PickerBuilder()
                .enableFeature(google.picker.Feature.NAV_HIDDEN)
                .setAppId(appId)
                .setOAuthToken(googleAccessToken)
                .setDeveloperKey(apiKey)
                .addView(view)
                .setCallback(processGooglePickerSelectionEvent)
                .build();
            picker.setVisible(true);
        }

        // ... Keep remaining functions (processGooglePickerSelectionEvent, etc.) ...
    </script>
</body>
</html>
